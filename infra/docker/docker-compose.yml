services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: semantic-search-db
    environment:
      POSTGRES_USER: searchuser
      POSTGRES_PASSWORD: searchpass
      POSTGRES_DB: semantic_search
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U searchuser -d semantic_search"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: semantic-search-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2
    container_name: semantic-search-mlflow
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000

  app:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    container_name: semantic-search-app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://searchuser:searchpass@postgres:5432/semantic_search
      SYNC_DATABASE_URL: postgresql://searchuser:searchpass@postgres:5432/semantic_search
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started

volumes:
  pgdata:
