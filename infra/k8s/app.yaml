apiVersion: apps/v1
kind: Deployment
metadata:
  name: semantic-search-api
  namespace: semantic-search
spec:
  replicas: 2
  selector:
    matchLabels:
      app: semantic-search-api
  template:
    metadata:
      labels:
        app: semantic-search-api
    spec:
      containers:
        - name: api
          image: semantic-search-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: postgresql+asyncpg://searchuser:searchpass@postgres:5432/semantic_search
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow:5000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: semantic-search-api
  namespace: semantic-search
spec:
  selector:
    app: semantic-search-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: semantic-search-ingress
  namespace: semantic-search
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: search.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: semantic-search-api
                port:
                  number: 80
